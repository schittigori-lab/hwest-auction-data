name: Harvey West Daily Scraper

on:
  schedule:
    - cron: '0 12 * * *'  # Runs every day at 8:00 AM Eastern (12:00 UTC)
  workflow_dispatch:        # Allows manual run from GitHub website anytime

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright pandas openpyxl python-dotenv
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env file from secrets
        run: |
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN_SECRET }}" >> .env
          echo "GITHUB_USERNAME=schittigori-lab" >> .env
          echo "GITHUB_REPO=hwest-auction-data" >> .env

      - name: Run scraper
        run: python hwest_scraper.py

      - name: Confirm JSON was created
        run: |
          if [ -f hwest_auctions.json ]; then
            echo "JSON file created successfully"
            cat hwest_auctions.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Total auctions: {d[\"total_auctions\"]} | Last updated: {d[\"last_updated\"]}')"
          else
            echo "ERROR: JSON file was not created"
            exit 1
          fi
