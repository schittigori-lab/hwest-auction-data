name: Harvey West Daily Scraper

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 8:00 AM Eastern (Mon-Fri)
    - cron: '0 13 * * 1-5'  # 9:00 AM Eastern
    - cron: '0 14 * * 1-5'  # 10:00 AM Eastern
    - cron: '0 15 * * 1-5'  # 11:00 AM Eastern
    - cron: '0 16 * * 1-5'  # 12:00 PM Eastern
    - cron: '0 17 * * 1-5'  # 1:00 PM Eastern
    - cron: '0 18 * * 1-5'  # 2:00 PM Eastern
    - cron: '0 19 * * 1-5'  # 3:00 PM Eastern
    - cron: '0 20 * * 1-5'  # 4:00 PM Eastern
    - cron: '0 21 * * 1-5'  # 5:00 PM Eastern
  workflow_dispatch:        # Allows manual run from GitHub website anytime

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to commit files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright pandas openpyxl python-dotenv
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env file from secrets
        run: |
          echo "GITHUB_TOKEN=${{ secrets.HWEST_TOKEN }}" > .env
          echo "GITHUB_USERNAME=schittigori-lab" >> .env
          echo "GITHUB_REPO=hwest-auction-data" >> .env

      - name: Run scraper
        run: python hwest_scraper.py

      - name: Confirm JSON was created
        run: |
          if [ -f hwest_auctions.json ]; then
            echo "JSON file created successfully"
            python3 -c "import json; d=json.load(open('hwest_auctions.json')); print(f'Total auctions: {d[\"total_auctions\"]} | Last updated: {d[\"last_updated\"]}')"
          else
            echo "ERROR: JSON file was not created"
            exit 1
          fi

      - name: Commit and push JSON to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hwest_auctions.json
          git diff --cached --quiet || git commit -m "Daily auction update $(date +'%Y-%m-%d')"
          git push
